<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- "TH" phosphor monogram — bladed letterforms, CRT scanline fill, green glow -->
  <defs>
    <path id="mono" d="
      M100,150 L262,46 L269,75 L212,117 L138,156 Z
      M262,46 L279,160 L259,482 L243,170 Z
      M201,124 L219,115 L206,365 Z
      M266,258 L357,240 L354,266 L266,286 Z
      M368,136 L378,264 L353,398 L337,391 L348,258 Z"/>
    <pattern id="scan" width="6" height="5" patternUnits="userSpaceOnUse">
      <rect width="6" height="5" fill="#54e893"/>
      <rect width="6" height="1.6" y="3.4" fill="#0e4229"/>
      <rect width="6" height="0.8" y="0" fill="#c9ffe2"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="halo" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#030705"/>
  <g transform="translate(30,0)">
    <use href="#mono" fill="#2fbf72" filter="url(#glow)" opacity=".8"/>
    <use href="#mono" fill="#9dffcd" filter="url(#halo)" opacity=".9"/>
    <use href="#mono" fill="url(#scan)"/>
    <use href="#mono" fill="none" stroke="#eafff3" stroke-width="1.6" stroke-linejoin="miter" opacity=".85"/>
  </g>
</svg>
